<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opus Translate</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- API Key Modal -->
    <div id="key-modal" class="modal hidden">
        <div class="modal-box">
            <h2>API Key Gerekli</h2>
            <p>Bu sunucu API key koruması altında.</p>
            <input id="key-input" type="password" placeholder="API key girin..." autocomplete="off">
            <div id="key-error" class="modal-error hidden">Geçersiz anahtar, tekrar deneyin.</div>
            <button id="key-submit" class="btn-primary">Bağlan</button>
        </div>
    </div>

    <header>
        <h1>Opus Translate</h1>
        <div class="header-actions">
            <div id="device-toggle" class="device-toggle hidden">
                <button class="dev-btn" data-dev="cpu">CPU</button>
                <button class="dev-btn" data-dev="cuda">GPU</button>
            </div>
            <div id="status" class="status">Bağlanıyor...</div>
            <button id="btn-key" class="btn-icon" title="API Key değiştir">🔑</button>
        </div>
    </header>

    <main>
        <!-- Çeviri -->
        <div class="translator-panel">
            <div class="panel">
                <div class="panel-header">
                    <span id="source-lang">Türkçe</span>
                    <button id="btn-swap" class="btn-swap" title="Yön değiştir">⇄</button>
                    <span id="target-lang">İngilizce</span>
                </div>
                <textarea id="source-text" placeholder="Çevrilecek metni yazın... (Ctrl+Enter)" rows="8"></textarea>
                <div class="panel-footer">
                    <span id="char-count">0 karakter</span>
                    <button id="btn-translate" class="btn-primary">Çevir</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span>Çeviri</span>
                    <button id="btn-copy" class="btn-icon" title="Kopyala">📋</button>
                </div>
                <div id="result-text" class="result-area"></div>
                <div class="panel-footer">
                    <span id="duration"></span>
                </div>
            </div>
        </div>

        <!-- Modeller -->
        <section class="section">
            <h2>Modeller</h2>
            <div class="model-cards">
                <div class="model-card" id="card-tr-en">
                    <div>
                        <div class="model-dir">TR → EN</div>
                        <div class="model-name">opus-mt-tc-big-tr-en</div>
                    </div>
                    <div class="model-actions">
                        <span class="badge" id="badge-tr-en">—</span>
                        <button class="btn-small btn-load" data-dir="tr-en">Yükle</button>
                        <button class="btn-small btn-unload hidden" data-dir="tr-en">Boşalt</button>
                    </div>
                </div>
                <div class="model-card" id="card-en-tr">
                    <div>
                        <div class="model-dir">EN → TR</div>
                        <div class="model-name">opus-mt-tc-big-en-tr</div>
                    </div>
                    <div class="model-actions">
                        <span class="badge" id="badge-en-tr">—</span>
                        <button class="btn-small btn-load" data-dir="en-tr">Yükle</button>
                        <button class="btn-small btn-unload hidden" data-dir="en-tr">Boşalt</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Geçmiş -->
        <section class="section">
            <div class="section-header">
                <h2>Geçmiş</h2>
                <button id="btn-clear-history" class="btn-small">Temizle</button>
            </div>
            <div id="history-list" class="history-list"></div>
        </section>

        <!-- Sunucu Durumu -->
        <section class="section">
            <h2>Sunucu Durumu</h2>
            <div id="stats" class="stats-grid"></div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
